<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1E1E2E"/>
  <g transform="translate(2, 6) scale(1)">
    <!-- Left lens -->
    <circle cx="10" cy="10" r="5" fill="none" stroke="#FF6B35" stroke-width="1.8"/>
    <!-- Right lens -->
    <circle cx="22" cy="10" r="5" fill="none" stroke="#FF6B35" stroke-width="1.8"/>
    <!-- Bridge -->
    <path d="M15 9.5 L17 9.5" fill="none" stroke="#FF6B35" stroke-width="1.4"/>
    <!-- Left arm -->
    <line x1="5" y1="9.5" x2="3.5" y2="7.5" stroke="#FF6B35" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="27" y1="9.5" x2="28.5" y2="7.5" stroke="#FF6B35" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Pupils -->
    <circle cx="10.5" cy="10" r="2" fill="white"/>
    <circle cx="22.5" cy="10" r="2" fill="white"/>
    <circle cx="11" cy="10.2" r="1.1" fill="#1A1A2A"/>
    <circle cx="23" cy="10.2" r="1.1" fill="#1A1A2A"/>
    <!-- Prompt -->
    <path d="M12 17 L14.5 19 L12 21" fill="none" stroke="#FF9F1C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="21" x2="19" y2="21" stroke="#FF9F1C" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
