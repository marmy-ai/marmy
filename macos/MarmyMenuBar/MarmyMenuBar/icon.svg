<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="90" fill="#1E1E2E"/>

  <!-- Exact same geometry as menubar icon, scaled up from 36x36 viewBox -->
  <!-- menubar uses transform="translate(4, 10)" in a 36x36 box -->
  <!-- scale factor: 512 / 36 ~= 14.2, offset adjusted to center -->
  <g transform="translate(57, 128) scale(14.2)">
    <!-- Left glasses lens -->
    <circle cx="7" cy="8" r="5.5" fill="none" stroke="#FF6B35" stroke-width="1.6"/>
    <!-- Right glasses lens -->
    <circle cx="21" cy="8" r="5.5" fill="none" stroke="#FF6B35" stroke-width="1.6"/>
    <!-- Bridge -->
    <path d="M 12.5 7.5 L 15.5 7.5" fill="none" stroke="#FF6B35" stroke-width="1.4"/>
    <!-- Left arm -->
    <line x1="1.5" y1="7.5" x2="0" y2="5.5" stroke="#FF6B35" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="26.5" y1="7.5" x2="28" y2="5.5" stroke="#FF6B35" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Left pupil -->
    <circle cx="7.8" cy="8" r="2.5" fill="white"/>
    <!-- Right pupil -->
    <circle cx="21.8" cy="8" r="2.5" fill="white"/>
    <!-- Left eye inner -->
    <circle cx="8.2" cy="8.2" r="1.4" fill="#1A1A2A"/>
    <!-- Right eye inner -->
    <circle cx="22.2" cy="8.2" r="1.4" fill="#1A1A2A"/>
    <!-- Left eye shine -->
    <circle cx="7.3" cy="7.2" r="0.6" fill="white"/>
    <!-- Right eye shine -->
    <circle cx="21.3" cy="7.2" r="0.6" fill="white"/>
    <!-- Nose/cursor: >_ -->
    <path d="M 11 16 L 14 18.5 L 11 21" fill="none" stroke="#FF9F1C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="15.5" y1="21" x2="19.5" y2="21" stroke="#FF9F1C" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
